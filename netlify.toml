[build]
  command = "npm run build"
  publish = "dist"

# SPA redirect - send all routes to index.html for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Environment variables documentation:
# Set VITE_API_URL in Netlify Environment Variables (Site settings > Environment variables)
# Value: https://crypo-app.onrender.com/api
